<div class="layout-wrapper">

  <!-- ── Top nav — Step 5: glassmorphic sticky header ───────── -->
  <header class="top-nav" role="banner">
    <div class="nav-inner">

      <!-- Brand -->
      <a class="brand" routerLink="/dashboard" aria-label="Laser Optical — go to dashboard">
        <app-brand-mark [size]="22" />
        <span class="brand-wordmark">Laser Optical</span>
      </a>

      <!-- Nav links -->
      <nav class="nav-links" aria-label="Main navigation">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <i class="pi pi-home" aria-hidden="true"></i>
          <span>Dashboard</span>
        </a>
        <a class="nav-link" routerLink="/customers" routerLinkActive="active">
          <i class="pi pi-users" aria-hidden="true"></i>
          <span>Customers</span>
        </a>
        <a class="nav-link" routerLink="/orders" routerLinkActive="active">
          <i class="pi pi-shopping-bag" aria-hidden="true"></i>
          <span>Orders</span>
        </a>
        @if (auth.isOwner()) {
          <a class="nav-link" routerLink="/staff" routerLinkActive="active">
            <i class="pi pi-id-card" aria-hidden="true"></i>
            <span>Staff</span>
          </a>
        }
      </nav>

      <!-- Actions: theme toggle + user info + logout -->
      <div class="nav-actions">

        <!-- Step 11: Theme toggle morph — both icons rendered, CSS controls visibility -->
        <button
          class="icon-btn theme-btn"
          type="button"
          [attr.aria-label]="themeAriaLabel"
          (click)="theme.toggle()"
        >
          <span class="theme-icons" [class.is-dark]="isDark" aria-hidden="true">
            <i class="pi pi-sun sun-icon"></i>
            <i class="pi pi-moon moon-icon"></i>
          </span>
        </button>

        <div class="user-info" [attr.aria-label]="'Signed in as ' + auth.getUser()?.name">
          <i class="pi pi-user" aria-hidden="true"></i>
          <span class="user-name">{{ auth.getUser()?.name }}</span>
          <span class="role-badge" [class.owner]="auth.isOwner()">
            {{ auth.getUser()?.role }}
          </span>
        </div>

        <button
          class="icon-btn logout-btn"
          type="button"
          aria-label="Logout"
          (click)="auth.logout()"
        >
          <i class="pi pi-sign-out" aria-hidden="true"></i>
        </button>

      </div>
    </div>
  </header>

  <!-- ── Main content — Step 9: route transition wrapper ────── -->
  <main class="layout-content" id="main-content">
    <div class="route-wrapper" [@routeTransition]="currentRoute()">
      <router-outlet />
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="layout-footer" role="contentinfo">
    <span>Laser Optical — Shop Management System</span>
    <span class="footer-sep" aria-hidden="true">·</span>
    <a
      href="https://github.com/muhammadwasim-dev"
      target="_blank"
      rel="noopener noreferrer"
      class="footer-link"
    >AI-DLC case study</a>
  </footer>

</div>
