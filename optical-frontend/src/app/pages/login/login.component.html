<!-- Step 6: Login hero — gradient mesh background + glassmorphic card -->
<div class="login-wrapper">

  <!-- Animated gradient mesh background layers -->
  <div class="login-bg-mesh" aria-hidden="true"></div>

  <!-- Theme toggle — floated top-right, visible before auth -->
  <button
    class="theme-toggle"
    type="button"
    [attr.aria-label]="themeAriaLabel"
    (click)="theme.toggle()"
  >
    <!-- Step 11: Theme icon morph -->
    <span class="theme-icons" [class.is-dark]="isDark" aria-hidden="true">
      <i class="pi pi-sun sun-icon"></i>
      <i class="pi pi-moon moon-icon"></i>
    </span>
  </button>

  <!-- Glassmorphic card -->
  <div class="login-card" role="main">

    <!-- Brand section — Step 3: animated brand mark -->
    <div class="login-brand" tabindex="-1">
      <div class="brand-mark-wrap">
        <app-brand-mark [size]="52" ariaLabel="Laser Optical logo" />
      </div>
      <h1 class="brand-name">Laser Optical</h1>
      <p class="brand-tagline">Sign in to manage your shop</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()" novalidate>

      @if (error) {
        <div class="form-error" role="alert" aria-live="polite">
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          <span>{{ error }}</span>
        </div>
      }

      <div class="field">
        <label for="username" class="field-label">Username</label>
        <input
          pInputText
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          placeholder="Enter your username"
          autocomplete="username"
          class="field-input"
          (keyup.enter)="onLogin()"
        />
      </div>

      <div class="field">
        <label for="password" class="field-label">Password</label>
        <p-password
          inputId="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="field-input w-full"
          (keyup.enter)="onLogin()"
        />
      </div>

      <!-- Primary CTA with gradient sweep -->
      <button
        class="login-btn"
        type="submit"
        [disabled]="loading"
        [attr.aria-busy]="loading"
      >
        @if (loading) {
          <i class="pi pi-spinner pi-spin" aria-hidden="true"></i>
        } @else {
          <i class="pi pi-sign-in" aria-hidden="true"></i>
        }
        <span>{{ loading ? 'Signing in…' : 'Sign in' }}</span>
      </button>

    </form>
  </div>
</div>
