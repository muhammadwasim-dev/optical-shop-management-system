<!-- Login page — vintage optometrist art behind glass card -->
<div class="login-wrapper">

  <!-- Theme toggle — fixed top-right, visible before auth -->
  <button
    class="theme-toggle"
    type="button"
    [attr.aria-label]="themeAriaLabel"
    (click)="theme.toggle()"
  >
    <span class="theme-icons" [class.is-dark]="isDark" aria-hidden="true">
      <i class="pi pi-sun sun-icon"></i>
      <i class="pi pi-moon moon-icon"></i>
    </span>
  </button>

  <!-- Vintage optometrist illustration — visible art behind glass vitrine -->
  <div class="login-illustration" aria-hidden="true">
    <svg
      viewBox="0 0 600 900"
      preserveAspectRatio="xMaxYMid meet"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <linearGradient id="vitrine-grad" gradientUnits="userSpaceOnUse"
                        x1="0" y1="0" x2="600" y2="900">
          <stop offset="0%"   stop-color="#818CF8"/>
          <stop offset="50%"  stop-color="#A78BFA"/>
          <stop offset="100%" stop-color="#E879F9"/>
        </linearGradient>
      </defs>

      <!-- ─── Refraction focal lens ──────────────────────────────────── -->
      <circle cx="300" cy="95" r="22" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="300" cy="95" r="14" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="300" cy="95" r="6"  fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ─── Refraction rays bending through the lens ──────────────── -->
      <line x1="300" y1="95" x2="55"  y2="20"  fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="300" y1="95" x2="20"  y2="95"  fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="300" y1="95" x2="55"  y2="170" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="300" y1="95" x2="545" y2="20"  fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="300" y1="95" x2="570" y2="95"  fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ─── Phoropter support structure ──────────────────────────── -->
      <!-- Vertical stem from lens down to crossbar -->
      <line x1="300" y1="117" x2="300" y2="195" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Horizontal crossbar -->
      <line x1="268" y1="195" x2="332" y2="195" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Main support arm down to bridge -->
      <line x1="300" y1="195" x2="300" y2="338" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>

      <!-- ─── Left eyepiece (phoropter) ─────────────────────────── -->
      <!-- Outer dial ring with graduation marks -->
      <circle cx="172" cy="355" r="110" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"/>
      <g transform="translate(172,355)" fill="none" stroke="url(#vitrine-grad)" stroke-linecap="round">
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(0)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(30)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(60)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(90)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(120)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(150)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(180)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(210)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(240)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(270)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(300)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(330)"/>
      </g>
      <!-- Concentric aperture rings -->
      <circle cx="172" cy="355" r="86" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="172" cy="355" r="64" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="172" cy="355" r="44" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="172" cy="355" r="28" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="172" cy="355" r="14" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <!-- Optical crosshair -->
      <line x1="156" y1="355" x2="188" y2="355" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="172" y1="339" x2="172" y2="371" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ─── Right eyepiece (phoropter) ────────────────────────── -->
      <circle cx="428" cy="355" r="110" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"/>
      <g transform="translate(428,355)" fill="none" stroke="url(#vitrine-grad)" stroke-linecap="round">
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(0)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(30)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(60)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(90)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(120)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(150)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(180)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(210)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(240)"/>
        <line x1="104" y1="0" x2="110" y2="0" stroke-width="2"   transform="rotate(270)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(300)"/>
        <line x1="106" y1="0" x2="110" y2="0" stroke-width="1.5" transform="rotate(330)"/>
      </g>
      <circle cx="428" cy="355" r="86" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="428" cy="355" r="64" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="428" cy="355" r="44" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="428" cy="355" r="28" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <circle cx="428" cy="355" r="14" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5"/>
      <line x1="412" y1="355" x2="444" y2="355" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="428" y1="339" x2="428" y2="371" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ─── Phoropter bridge ───────────────────────────────────── -->
      <!-- Gap: left 172+110=282, right 428-110=318 -->
      <line x1="282" y1="338" x2="318" y2="338" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"   stroke-linecap="round"/>
      <line x1="282" y1="372" x2="318" y2="372" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"   stroke-linecap="round"/>
      <line x1="282" y1="338" x2="282" y2="372" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="318" y1="338" x2="318" y2="372" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Nose rest arc -->
      <path d="M 282 372 Q 300 398 318 372" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ─── Antique round spectacles (Lennon / Harry Potter style) ─ -->
      <!-- Left lens -->
      <circle cx="192" cy="555" r="64" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"/>
      <circle cx="192" cy="555" r="56" fill="none" stroke="url(#vitrine-grad)" stroke-width="1"/>
      <!-- Right lens -->
      <circle cx="408" cy="555" r="64" fill="none" stroke="url(#vitrine-grad)" stroke-width="2"/>
      <circle cx="408" cy="555" r="56" fill="none" stroke="url(#vitrine-grad)" stroke-width="1"/>
      <!-- Bridge: 192+64=256 to 408-64=344 -->
      <path d="M 256 547 Q 300 532 344 547" fill="none" stroke="url(#vitrine-grad)" stroke-width="2" stroke-linecap="round"/>
      <!-- Temple arms -->
      <path d="M 128 555 Q 68 555 46 576"  fill="none" stroke="url(#vitrine-grad)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 472 555 Q 532 555 554 576" fill="none" stroke="url(#vitrine-grad)" stroke-width="2" stroke-linecap="round"/>
      <!-- Hinge details -->
      <rect x="124" y="550" width="8" height="10" rx="1" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.3"/>
      <rect x="468" y="550" width="8" height="10" rx="1" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.3"/>

      <!-- ─── Snellen eye chart ──────────────────────────────────── -->
      <rect x="120" y="680" width="360" height="200" rx="5" fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8"/>
      <!-- Header separator -->
      <line x1="120" y1="706" x2="480" y2="706" fill="none" stroke="url(#vitrine-grad)" stroke-width="1"/>
      <!-- "SNELLEN" title -->
      <text x="300" y="698" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="11" letter-spacing="4"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="0.8">SNELLEN</text>
      <!-- Letters in descending size — E F P T O Z -->
      <text x="300" y="748" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="44" font-weight="400"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1.8">E</text>
      <text x="300" y="782" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="30" font-weight="400"
            letter-spacing="12"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1.5">FP</text>
      <text x="300" y="812" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="22" font-weight="400"
            letter-spacing="10"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1.3">TOZ</text>
      <text x="300" y="834" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="17" font-weight="400"
            letter-spacing="7"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1.2">LPED</text>
      <text x="300" y="853" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="400"
            letter-spacing="5"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1.1">PECFD</text>
      <text x="300" y="869" text-anchor="middle"
            font-family="'Georgia','Times New Roman',serif" font-size="10" font-weight="400"
            letter-spacing="3"
            fill="none" stroke="url(#vitrine-grad)" stroke-width="1">EDFCZP</text>

    </svg>
  </div>

  <!-- Glassmorphic sign-in card — sits over the illustration -->
  <div class="login-card" role="main">

    <!-- Brand section -->
    <div class="login-brand" tabindex="-1">
      <div class="brand-mark-wrap">
        <app-brand-mark [size]="52" ariaLabel="Laser Optical logo" />
      </div>
      <h1 class="brand-name">Laser Optical</h1>
      <p class="brand-tagline">Sign in to manage your shop</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()" novalidate>

      @if (error) {
        <div class="form-error" role="alert" aria-live="polite">
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          <span>{{ error }}</span>
        </div>
      }

      <div class="field">
        <label for="username" class="field-label">Username</label>
        <input
          pInputText
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          placeholder="Enter your username"
          autocomplete="username"
          class="field-input"
          (keyup.enter)="onLogin()"
        />
      </div>

      <div class="field">
        <label for="password" class="field-label">Password</label>
        <p-password
          inputId="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="field-input w-full"
          (keyup.enter)="onLogin()"
        />
      </div>

      <!-- Primary CTA with gradient sweep -->
      <button
        class="login-btn"
        type="submit"
        [disabled]="loading"
        [attr.aria-busy]="loading"
      >
        @if (loading) {
          <i class="pi pi-spinner pi-spin" aria-hidden="true"></i>
        } @else {
          <i class="pi pi-sign-in" aria-hidden="true"></i>
        }
        <span>{{ loading ? 'Signing in…' : 'Sign in' }}</span>
      </button>

    </form>
  </div>
</div>
